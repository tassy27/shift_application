<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>提出内容確認 | Shift Aggregation</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="wrap">
    <header class="page-hero">
      <div class="hero-grid">
        <div>
          <h1>提出内容の確認 <span class="pill">Employee</span></h1>
          <p class="subtext">提出前の最終確認画面です。申請者名・対象月・日数・時間を確認してから提出してください。</p>
          <div class="stepper" aria-label="申請ステップ">
            <div class="step is-complete">
              <div class="step-index">1</div>
              <div class="step-title">入力</div>
              <div class="step-desc">日付・時間を設定</div>
            </div>
            <div class="step is-active">
              <div class="step-index">2</div>
              <div class="step-title">確認</div>
              <div class="step-desc">内容を最終確認</div>
            </div>
            <div class="step">
              <div class="step-index">3</div>
              <div class="step-title">完了</div>
              <div class="step-desc">提出IDを確認</div>
            </div>
          </div>
          <div class="top-nav" data-nav-target="#confirmActionNavAnchor">
            <button type="button" class="btn btn-secondary" onclick="location.href='/employee.html'">入力画面へ戻る</button>
<button id="logoutBtn" type="button" class="btn btn-secondary" style="display:none;">ログアウト</button>
          </div>
        </div>
      </div>
    </header>

    <section id="submitResultBanner" class="result-banner hidden" aria-live="polite">
      <p class="result-title">提出が完了しました</p>
      <div class="info-list">
        <div class="info-item"><dt>提出ID</dt><dd id="submittedIdView">-</dd></div>
        <div class="info-item"><dt>申請者</dt><dd id="submittedEmployeeView">-</dd></div>
        <div class="info-item"><dt>対象月</dt><dd id="submittedYearMonthView">-</dd></div>
      </div>
      <div class="btn-row-2" style="margin-top:10px;">
        <button id="submittedRestartBtn" type="button" class="btn btn-secondary">シフト申請を再度行う</button>
        <button id="submittedLogoutBtn" type="button" class="btn btn-primary">ログアウト</button>
      </div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>カレンダー確認</h2>
        <div class="hint">選択した日には時間も表示されます</div>
      </div>
      <div id="confirmCalendar" class="calendar-grid"></div>
    </section>

    <section class="card">
      <div class="section-title">
        <h2>日付別の提出内容</h2>
        <div class="hint">日付順に表示</div>
      </div>
      <ul id="confirmList" class="confirm-list"></ul>
    </section>

    <div class="panel-grid">
      <section class="card">
        <div class="section-title">
          <h2>操作</h2>
          <span class="badge">Step 2 / 3</span>
        </div>
        <div class="btn-row-2">
          <button id="backEditBtn" type="button" class="btn btn-secondary">修正に戻る</button>
          <button id="confirmSubmitBtn" type="button" class="btn btn-primary">この内容で提出する</button>
        </div>
        <div id="confirmActionNavAnchor"></div>
        <div class="hint" style="margin-top:8px;">提出後はこの画面に提出IDを表示します。</div>
      </section>
    </div>

    <section class="card">
      <div class="section-title">
        <h2>デバッグ情報</h2>
        <div class="hint">開発用（問題切り分け時のみ確認）</div>
      </div>
      <pre id="out">ready</pre>
    </section>
  </div>

  <script src="/js/app-common.js"></script>
  <script>
    const out = document.getElementById("out");
    const confirmCalendar = document.getElementById("confirmCalendar");
    const confirmList = document.getElementById("confirmList");
    const logoutBtn = document.getElementById("logoutBtn");
    const submittedRestartBtn = document.getElementById("submittedRestartBtn");
    const submittedLogoutBtn = document.getElementById("submittedLogoutBtn");
    const DRAFT_KEY = "shiftSubmissionDraft";
    let draft = null;
    let me = null;

    function show(label, data) {
      out.textContent = `[${label}]\n` + JSON.stringify(data, null, 2);
    }

    function loadDraft() {
      try {
        const raw = sessionStorage.getItem(DRAFT_KEY);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function clearDraft() {
      sessionStorage.removeItem(DRAFT_KEY);
    }

    function extractSubmissionId(res) {
      return res?.data?.id ?? res?.id ?? res?.data?.submissionId ?? "(取得不可)";
    }

    function renderHeaderSummary(d) {
      const meLabel = me ? `${me.name || me.email}` : "local-dev";
      document.getElementById("submittedEmployeeView").textContent = meLabel;
      document.getElementById("submittedYearMonthView").textContent = d.yearMonth;
    }

    function renderConfirm(d) {
      const [y, m] = d.yearMonth.split("-").map(Number);
      const firstWd = new Date(y, m - 1, 1).getDay();
      const last = new Date(y, m, 0).getDate();
      const memoMap = new Map(
        d.details.map((x) => {
          const [start, end] = (x.memo || "09:00-16:00").split("-");
          return [x.targetDate, `${start}-${end}`];
        })
      );
      const dateSet = new Set(d.details.map((x) => x.targetDate));
      const head = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"]
        .map((w) => `<div class="calendar-cell is-head">${w}</div>`)
        .join("");
      const cells = [];
      for (let i = 0; i < firstWd; i++) {
        cells.push('<div class="calendar-cell is-empty"></div>');
      }
      for (let day = 1; day <= last; day++) {
        const date = `${y}-${pad2(m)}-${pad2(day)}`;
        const cls = dateSet.has(date) ? "calendar-cell has-shift" : "calendar-cell";
        const timeText = memoMap.get(date);
        const timeHtml = timeText ? `<br><small>${timeText}</small>` : "";
        cells.push(`<div class="${cls}">${m}/${day}${timeHtml}</div>`);
      }
      confirmCalendar.innerHTML = head + cells.join("");
      confirmList.innerHTML = d.details
        .map((x) => {
          const [start, end] = (x.memo || "09:00-16:00").split("-");
          return `<li>${toMonthDay(x.targetDate)} ${start}-${end}</li>`;
        })
        .join("");
    }

    async function init() {
      draft = loadDraft();
      if (!draft || !draft.yearMonth || !Array.isArray(draft.details) || draft.details.length === 0) {
        show("error", { message: "確認データがありません。申請画面からやり直してください。" });
        document.getElementById("confirmList").innerHTML = '<li>確認データがありません。申請画面に戻って入力してください。</li>';
        return;
      }
      me = await getMeOrNull();
      if (me) logoutBtn.style.display = "inline-block";
      renderHeaderSummary(draft);
      renderConfirm(draft);
      show("confirm-ready", { count: draft.details.length, yearMonth: draft.yearMonth });
    }

    document.getElementById("backEditBtn").addEventListener("click", () => {
      location.href = "/employee.html";
    });

    document.getElementById("confirmSubmitBtn").addEventListener("click", async () => {
      if (!draft) {
        show("submit-error", { message: "提出データが見つかりません" });
        return;
      }
      const payload = {
        yearMonth: draft.yearMonth,
        note: draft.note || "",
        details: draft.details,
        employeeId: me && Number.isInteger(me.employeeId) ? me.employeeId : undefined
      };
      try {
        const res = await req("/api/v1/shift-submissions", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        clearDraft();
        const submitId = extractSubmissionId(res);
        document.getElementById("submittedIdView").textContent = `提出ID:${submitId}`;
        document.getElementById("submitResultBanner").classList.remove("hidden");
        const heroSubmitStateEl = document.getElementById("heroSubmitState");
        if (heroSubmitStateEl) heroSubmitStateEl.textContent = "????";
        const readyBadgeEl = document.getElementById("readyBadge");
        if (readyBadgeEl) {
          readyBadgeEl.textContent = "????";
          readyBadgeEl.className = "badge success";
        }
        document.getElementById("confirmSubmitBtn").disabled = true;
        document.getElementById("confirmSubmitBtn").textContent = "提出済み";
        show("submit-success", res);
      } catch (e) {
        show("submit-error", e);
      }
    });

    submittedRestartBtn.addEventListener("click", () => {
      clearDraft();
      location.href = "/employee.html";
    });

    submittedLogoutBtn.addEventListener("click", async () => {
      try {
        await req("/api/v1/auth/logout", { method: "POST" });
      } catch (_) {}
      clearDraft();
      location.href = "/";
    });

    logoutBtn.addEventListener("click", async () => {
      try {
        await req("/api/v1/auth/logout", { method: "POST" });
      } catch (_) {}
      clearDraft();
      location.href = "/";
    });

    init().catch((e) => show("init-error", e));
  </script>
</body>
</html>
